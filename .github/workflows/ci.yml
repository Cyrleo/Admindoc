name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check (admin modules)
        run: |
          python -m py_compile \
            cors/pages/admin_api/permissions.py \
            cors/pages/admin_api/serializers.py \
            cors/pages/admin_api/views.py \
            cors/pages/admin_api/urls.py

      - name: Django checks
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          DEBUG: "false"
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py check

      - name: Run tests
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          DEBUG: "false"
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py test cors.tests -v 2
